<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZenFlow — Productivity App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;min-height:100vh;transition:background .3s}
body.light{background:#f1f5f9;color:#1e293b}
body.dark{background:#0f172a;color:#f1f5f9}
/* Header */
.header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.logo{font-weight:800;font-size:18px;color:#6366f1}
.logo-sub{font-size:11px;color:var(--sub)}
/* Nav */
.nav{display:flex;gap:2px;padding:0 12px;border-bottom:1px solid var(--border);overflow-x:auto}
.nav button{padding:11px 12px;border:none;background:none;cursor:pointer;font-weight:400;font-size:12px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.nav button.active{font-weight:700;color:#6366f1;border-bottom-color:#6366f1}
/* Content */
.content{padding:16px;max-width:600px;margin:0 auto}
/* Card */
.card{border-radius:16px;padding:20px;border:1px solid var(--border);margin-bottom:12px}
/* Inputs */
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;outline:none;font-family:inherit;background:var(--input);color:var(--text);margin-bottom:10px}
textarea{resize:vertical}
.btn{padding:9px 16px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:13px}
.btn-primary{background:#6366f1;color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:none;border:none;cursor:pointer;color:#ef4444;font-size:15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Tags */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
/* Toggle */
.toggle-wrap{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:16px}
.toggle-wrap button{flex:1;padding:7px 0;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all .2s;background:transparent;color:var(--sub)}
.toggle-wrap button.active{background:#3b82f6;color:#fff}
/* Progress bar */
.pbar-wrap{background:var(--border);border-radius:10px;height:8px;margin-top:6px}
.pbar{height:8px;border-radius:10px;transition:width .4s}
/* Reminder */
.reminder{background:#fef3c7;border:1px solid #fbbf24;border-radius:12px;padding:12px 16px;color:#92400e;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
/* Note card */
.note-card{border-radius:14px;padding:16px;margin-bottom:10px}
/* Switch */
.switch{width:46px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.switch-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s}
/* Habit circle */
.habit-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s;flex-shrink:0}
/* Stat card */
.stat-card{border-radius:16px;padding:16px;border:1px solid var(--border);text-align:center}
.stat-val{font-size:32px;font-weight:800}
.stat-lbl{font-size:12px;margin-top:4px}
/* Row util */
.row{display:flex;align-items:center;gap:10px}
.row-between{display:flex;justify-content:space-between;align-items:center}
/* Section label */
.section-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
/* Cal */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-hdr{text-align:center;font-size:11px;font-weight:700;padding:4px 0}
.cal-cell{min-height:50px;border-radius:8px;padding:4px;border:1px solid var(--border)}
.cal-cell.today{background:#6366f1}
.cal-cell.today .cal-num{color:#fff;font-weight:700}
.cal-num{font-size:12px;margin-bottom:2px}
.cal-task{font-size:9px;color:#fff;border-radius:4px;padding:1px 4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
/* Page title */
.page-title{font-weight:700;font-size:18px;margin-bottom:16px}
/* Separator */
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
/* Note colors */
.nc0{background:#fef9c3}.nc1{background:#dcfce7}.nc2{background:#dbeafe}.nc3{background:#fce7f3}.nc4{background:#ede9fe}
.nc-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;display:inline-block}
</style>
</head>
<body class="light">
<div id="app"></div>

<script>
// ── State ──────────────────────────────────────────────
const TODAY = new Date().toISOString().split('T')[0];
const PRIORITY_COLORS = {High:'#ef4444',Medium:'#f59e0b',Low:'#22c55e'};
const PROJ_COLORS = ['#6366f1','#f59e0b','#22c55e','#ef4444','#ec4899','#06b6d4','#84cc16','#a855f7'];
const NOTE_COLORS = ['#fef9c3','#dcfce7','#dbeafe','#fce7f3','#ede9fe'];
const NAV = ['Dashboard','Tasks','Calendar','Habits','Progress','Notes','Settings'];
const NAV_ICONS = {Dashboard:'🏠',Tasks:'✅',Calendar:'📅',Habits:'🔥',Progress:'📈',Notes:'📝',Settings:'⚙️'};

let state = {
  dark: false,
  tab: 'Dashboard',
  team: ['Me','Alice','Bob','Carol','David'],
  tasks: [
    {id:1,title:'Design landing page',priority:'High',due:TODAY,assignee:'Me',done:false,reminder:true},
    {id:2,title:'Team sync meeting',priority:'Medium',due:TODAY,assignee:'Alice',done:false,reminder:false},
    {id:3,title:'Write project report',priority:'Low',due:TODAY,assignee:'Bob',done:true,reminder:false},
  ],
  habits: ['Exercise','Read','Meditate','Hydrate','Sleep 8hrs'].map((h,i)=>({id:i,name:h,streak:Math.floor(Math.random()*10),doneToday:false})),
  projects: [
    {id:1,name:'Website Redesign',progress:65,color:'#6366f1'},
    {id:2,name:'Mobile App',progress:30,color:'#f59e0b'},
    {id:3,name:'Marketing Campaign',progress:80,color:'#22c55e'},
  ],
  notes: [
    {id:1,title:'Meeting Notes',body:'Discuss Q3 goals with team...',color:'#fef9c3',pinned:true},
    {id:2,title:'Ideas',body:'New feature ideas for the app...',color:'#dbeafe',pinned:false},
  ],
  reminder: null,
  calMonth: new Date(),
  // forms
  showTaskForm: false,
  taskForm: {title:'',priority:'Medium',due:TODAY,assignee:'Me',reminder:false},
  showNoteForm: false,
  editNoteId: null,
  noteForm: {title:'',body:'',color:'#fef9c3'},
  newMember: '',
  newProject: '',
};

// ── CSS vars ───────────────────────────────────────────
function applyTheme(){
  const d = state.dark;
  const r = document.documentElement.style;
  document.body.className = d ? 'dark' : 'light';
  r.setProperty('--bg', d?'#0f172a':'#f1f5f9');
  r.setProperty('--bg2', d?'#1e293b':'#ffffff');
  r.setProperty('--card', d?'#1e293b':'#ffffff');
  r.setProperty('--border', d?'#334155':'#e2e8f0');
  r.setProperty('--text', d?'#f1f5f9':'#1e293b');
  r.setProperty('--sub', d?'#94a3b8':'#64748b');
  r.setProperty('--input', d?'#0f172a':'#f8fafc');
}

// ── Helpers ────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = d => new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const fmtKg = kg => kg.toFixed(1)+' kg';
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

function re(){ applyTheme(); render(); }

function render(){
  $('app').innerHTML = buildApp();
  bindEvents();
}

// ── Build HTML ─────────────────────────────────────────
function buildApp(){
  const s = state;
  return `
  <div class="header" style="background:var(--card)">
    <div><div class="logo">ZenFlow</div><div class="logo-sub" style="color:var(--sub)">Your Productivity Hub</div></div>
    <button class="btn" style="background:var(--bg);border:1px solid var(--border);color:var(--text)" onclick="toggleDark()">${s.dark?'☀️':'🌙'}</button>
  </div>
  <div class="nav" style="background:var(--card)">${NAV.map(n=>`<button class="${s.tab===n?'active':''}" style="color:${s.tab===n?'#6366f1':'var(--sub)'}" onclick="setTab('${n}')">${NAV_ICONS[n]} ${n}</button>`).join('')}</div>
  <div class="content">${buildTab()}</div>`;
}

function buildTab(){
  switch(state.tab){
    case 'Dashboard': return buildDashboard();
    case 'Tasks': return buildTasks();
    case 'Calendar': return buildCalendar();
    case 'Habits': return buildHabits();
    case 'Progress': return buildProgress();
    case 'Notes': return buildNotes();
    case 'Settings': return buildSettings();
  }
  return '';
}

// ── Dashboard ──────────────────────────────────────────
function buildDashboard(){
  const s = state;
  const done = s.tasks.filter(t=>t.done).length;
  const total = s.tasks.length;
  const streaks = s.habits.reduce((a,h)=>a+h.streak,0);
  const avgP = s.projects.length ? Math.round(s.projects.reduce((a,p)=>a+p.progress,0)/s.projects.length) : 0;
  const todayTasks = s.tasks.filter(t=>t.due===TODAY);
  const pinned = s.notes.filter(n=>n.pinned);

  return `
  ${s.reminder?`<div class="reminder">${s.reminder}<button onclick="clearReminder()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#92400e">×</button></div>`:''}
  <div class="grid3" style="margin-bottom:12px">
    ${statCard(done+'/'+total,'Tasks Done','✅','#6366f1')}
    ${statCard(streaks,'Total Streaks','🔥','#f59e0b')}
    ${statCard(avgP+'%','Avg Progress','📈','#22c55e')}
  </div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">📋 Today's Tasks</div>
    ${todayTasks.length===0?'<div style="color:var(--sub);font-size:13px">No tasks due today 🎉</div>':todayTasks.slice(0,4).map(t=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="accent-color:#6366f1;width:16px;height:16px"/>
      <span style="flex:1;color:var(--text);font-size:14px;${t.done?'text-decoration:line-through;opacity:.5':''}">${t.title}</span>
      <span class="badge" style="background:${PRIORITY_COLORS[t.priority]}22;color:${PRIORITY_COLORS[t.priority]}">${t.priority}</span>
    </div>`).join('')}
  </div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">🚀 Projects</div>
    ${s.projects.map(p=>`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:var(--text)">${p.name}</span>
        <span style="font-size:13px;font-weight:700;color:${p.color}">${p.progress}%</span>
      </div>
      <div class="pbar-wrap"><div class="pbar" style="width:${p.progress}%;background:${p.color}"></div></div>
    </div>`).join('')}
  </div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">📝 Pinned Notes</div>
    ${pinned.length===0?'<div style="color:var(--sub);font-size:13px">No pinned notes. Pin notes from the Notes tab!</div>':pinned.map(n=>`
    <div style="background:${n.color};border-radius:10px;padding:10px 14px;margin-bottom:8px">
      <div style="font-weight:700;font-size:13px;color:#1e293b">${n.title}</div>
      <div style="font-size:12px;color:#475569;margin-top:2px">${n.body.slice(0,60)}${n.body.length>60?'...':''}</div>
    </div>`).join('')}
  </div>`;
}

function statCard(val,lbl,icon,color){
  return `<div class="stat-card" style="background:var(--card)"><div style="font-size:22px">${icon}</div><div class="stat-val" style="color:${color}">${val}</div><div class="stat-lbl" style="color:var(--sub)">${lbl}</div></div>`;
}

// ── Tasks ──────────────────────────────────────────────
function buildTasks(){
  const s = state;
  const tf = s.taskForm;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="page-title" style="color:var(--text);margin-bottom:0">All Tasks</div>
    <button class="btn btn-primary" onclick="toggleTaskForm()">+ Add Task</button>
  </div>
  ${s.showTaskForm?`
  <div class="card" style="background:var(--card)">
    <input type="text" id="tf-title" placeholder="Task title..." value="${tf.title}" oninput="updateTaskForm('title',this.value)"/>
    <div class="grid3">
      <select onchange="updateTaskForm('priority',this.value)">${['High','Medium','Low'].map(p=>`<option ${tf.priority===p?'selected':''}>${p}</option>`).join('')}</select>
      <select onchange="updateTaskForm('assignee',this.value)">${s.team.map(m=>`<option ${tf.assignee===m?'selected':''}>${m}</option>`).join('')}</select>
      <input type="date" value="${tf.due}" onchange="updateTaskForm('due',this.value)" style="margin-bottom:10px"/>
    </div>
    <label style="display:flex;align-items:center;gap:8px;color:var(--text);font-size:13px;cursor:pointer;margin-bottom:10px">
      <input type="checkbox" ${tf.reminder?'checked':''} onchange="updateTaskForm('reminder',this.checked)" style="accent-color:#6366f1"/>
      Set reminder for due date
    </label>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="addTask()">Add</button>
      <button class="btn btn-secondary" style="flex:1" onclick="toggleTaskForm()">Cancel</button>
    </div>
  </div>`:''}
  ${['High','Medium','Low'].map(pri=>{
    const pts = s.tasks.filter(t=>t.priority===pri);
    if(!pts.length) return '';
    return `<div style="margin-bottom:4px"><div class="section-lbl" style="color:${PRIORITY_COLORS[pri]}">${pri} Priority</div>
    ${pts.map(t=>`
    <div class="card" style="background:var(--card);padding:14px 16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})" style="accent-color:#6366f1;width:16px;height:16px"/>
        <div style="flex:1">
          <div style="color:var(--text);font-size:14px;font-weight:600;${t.done?'text-decoration:line-through;opacity:.5':''}">${t.title}</div>
          <div style="display:flex;gap:10px;margin-top:4px;flex-wrap:wrap">
            <span style="font-size:11px;color:var(--sub)">👤 ${t.assignee}</span>
            <span style="font-size:11px;color:var(--sub)">📅 ${fmt(t.due)}</span>
            ${t.reminder?'<span style="font-size:11px;color:#f59e0b">⏰</span>':''}
          </div>
        </div>
        <button class="btn-danger" onclick="deleteTask(${t.id})">🗑</button>
      </div>
    </div>`).join('')}</div>`;
  }).join('')}`;
}

// ── Calendar ───────────────────────────────────────────
function buildCalendar(){
  const s = state;
  const cm = s.calMonth;
  const y = cm.getFullYear(), m = cm.getMonth();
  const monthName = cm.toLocaleString('default',{month:'long',year:'numeric'});
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const cells = [];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(d);

  const tasksOnDay = d => {
    const ms = String(m+1).padStart(2,'0'), ds = String(d).padStart(2,'0');
    return s.tasks.filter(t=>t.due===`${y}-${ms}-${ds}`);
  };

  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text)" onclick="calPrev()">‹</button>
    <div style="font-weight:700;font-size:16px;color:var(--text)">${monthName}</div>
    <button class="btn" style="background:var(--card);border:1px solid var(--border);color:var(--text)" onclick="calNext()">›</button>
  </div>
  <div class="card" style="background:var(--card);padding:12px">
    <div class="cal-grid" style="margin-bottom:8px">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-hdr" style="color:var(--sub)">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells.map(d=>{
      if(!d) return '<div></div>';
      const ts = tasksOnDay(d);
      const isToday = new Date().getDate()===d && new Date().getMonth()===m && new Date().getFullYear()===y;
      return `<div class="cal-cell ${isToday?'today':''}" style="background:${isToday?'#6366f1':'var(--bg)'};border-color:var(--border)">
        <div class="cal-num" style="color:${isToday?'#fff':'var(--text)'}">${d}</div>
        ${ts.slice(0,2).map(t=>`<div class="cal-task" style="background:${PRIORITY_COLORS[t.priority]}">${t.title}</div>`).join('')}
        ${ts.length>2?`<div style="font-size:9px;color:var(--sub)">+${ts.length-2}</div>`:''}
      </div>`;
    }).join('')}</div>
  </div>`;
}

// ── Habits ─────────────────────────────────────────────
function buildHabits(){
  return `
  <div class="page-title" style="color:var(--text)">🔥 Habits & Streaks</div>
  ${state.habits.map(h=>`
  <div class="card" style="background:var(--card);padding:16px 20px">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="habit-circle" style="background:${h.doneToday?'#6366f1':'var(--bg)'};border:3px solid ${h.doneToday?'#6366f1':'var(--border)'}" onclick="toggleHabit(${h.id})">${h.doneToday?'✅':'⭕'}</div>
      <div style="flex:1">
        <div style="font-weight:700;color:var(--text);font-size:15px">${h.name}</div>
        <div style="font-size:12px;color:var(--sub)">${h.doneToday?'Done today!':'Tap to complete'}</div>
        <div class="pbar-wrap" style="margin-top:6px"><div class="pbar" style="width:${Math.min(100,(h.streak/30)*100)}%;background:#f59e0b"></div></div>
      </div>
      <div style="text-align:center">
        <div style="font-size:22px;font-weight:800;color:#f59e0b">${h.streak}</div>
        <div style="font-size:11px;color:var(--sub)">day streak</div>
      </div>
    </div>
  </div>`).join('')}`;
}

// ── Progress ───────────────────────────────────────────
function buildProgress(){
  const s = state;
  const done = s.tasks.filter(t=>t.done).length;
  const total = s.tasks.length;
  const hd = s.habits.filter(h=>h.doneToday).length;
  return `
  <div class="page-title" style="color:var(--text)">📈 Progress Tracker</div>
  <div class="grid2" style="margin-bottom:12px">
    <div class="card" style="background:var(--card);text-align:center">
      <div style="font-size:32px;font-weight:800;color:#6366f1">${done}/${total}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">Tasks Completed</div>
      <div class="pbar-wrap" style="margin-top:10px"><div class="pbar" style="width:${total?(done/total)*100:0}%;background:#6366f1"></div></div>
    </div>
    <div class="card" style="background:var(--card);text-align:center">
      <div style="font-size:32px;font-weight:800;color:#f59e0b">${hd}/${s.habits.length}</div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">Habits Today</div>
      <div class="pbar-wrap" style="margin-top:10px"><div class="pbar" style="width:${(hd/s.habits.length)*100}%;background:#f59e0b"></div></div>
    </div>
  </div>
  ${s.projects.map(p=>`
  <div class="card" style="background:var(--card)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-weight:700;color:var(--text)">${p.name}</div>
      <div style="font-size:20px;font-weight:800;color:${p.color}">${p.progress}%</div>
    </div>
    <div class="pbar-wrap" style="height:12px"><div class="pbar" style="width:${p.progress}%;background:${p.color};height:12px"></div></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-secondary" style="flex:1" onclick="adjustProgress(${p.id},-5)">− 5%</button>
      <button class="btn" style="flex:1;background:${p.color};color:#fff" onclick="adjustProgress(${p.id},5)">+ 5%</button>
    </div>
  </div>`).join('')}`;
}

// ── Notes ──────────────────────────────────────────────
function buildNotes(){
  const s = state;
  const nf = s.noteForm;
  const pinned = s.notes.filter(n=>n.pinned);
  const unpinned = s.notes.filter(n=>!n.pinned);
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="page-title" style="color:var(--text);margin-bottom:0">📝 Notes</div>
    <button class="btn btn-primary" onclick="openNoteForm(null)">+ New Note</button>
  </div>
  ${s.showNoteForm?`
  <div class="card" style="background:var(--card)">
    <input type="text" id="nf-title" placeholder="Note title..." value="${nf.title}" oninput="updateNoteForm('title',this.value)"/>
    <textarea rows="4" placeholder="Write your note..." oninput="updateNoteForm('body',this.value)">${nf.body}</textarea>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
      <span style="font-size:12px;color:var(--sub)">Color:</span>
      ${NOTE_COLORS.map(c=>`<div class="nc-dot" style="background:${c};border:${nf.color===c?'3px solid #6366f1':'2px solid transparent'}" onclick="updateNoteForm('color','${c}')"></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="flex:1" onclick="saveNote()">${s.editNoteId!==null?'Update':'Save'}</button>
      <button class="btn btn-secondary" style="flex:1" onclick="closeNoteForm()">Cancel</button>
    </div>
  </div>`:''}
  ${pinned.length?`<div class="section-lbl" style="color:var(--sub)">📌 Pinned</div>${pinned.map(n=>noteCard(n)).join('')}`:''}
  ${unpinned.length?`<div class="section-lbl" style="color:var(--sub);margin-top:8px">All Notes</div>${unpinned.map(n=>noteCard(n)).join('')}`:''}
  ${s.notes.length===0?'<div style="color:var(--sub);font-size:13px">No notes yet. Add your first note!</div>':''}`;
}

function noteCard(n){
  return `<div style="background:${n.color};border-radius:14px;padding:16px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="font-weight:700;font-size:14px;color:#1e293b">${n.title}</div>
      <div style="display:flex;gap:6px">
        <button onclick="pinNote(${n.id})" style="background:none;border:none;cursor:pointer;font-size:14px;opacity:${n.pinned?1:.5}">📌</button>
        <button onclick="openNoteForm(${n.id})" style="background:none;border:none;cursor:pointer;font-size:14px">✏️</button>
        <button onclick="deleteNote(${n.id})" style="background:none;border:none;cursor:pointer;font-size:14px">🗑</button>
      </div>
    </div>
    <div style="font-size:13px;color:#475569;margin-top:6px">${n.body}</div>
  </div>`;
}

// ── Settings ───────────────────────────────────────────
function buildSettings(){
  const s = state;
  return `
  <div class="page-title" style="color:var(--text)">⚙️ Settings</div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">👥 Team Members</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="inp-member" placeholder="Add team member name..." value="${s.newMember}" oninput="state.newMember=this.value" style="margin-bottom:0" onkeydown="if(event.key==='Enter')addMember()"/>
      <button class="btn btn-primary" onclick="addMember()">Add</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${s.team.map(m=>`<div style="display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:6px 12px">
        <span style="font-size:13px;color:var(--text)">👤 ${m}</span>
        ${m!=='Me'?`<button onclick="deleteMember('${m}')" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px;line-height:1">×</button>`:''}
      </div>`).join('')}
    </div>
  </div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">🚀 Projects</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="inp-project" placeholder="Add project name..." value="${s.newProject}" oninput="state.newProject=this.value" style="margin-bottom:0" onkeydown="if(event.key==='Enter')addProject()"/>
      <button class="btn btn-primary" onclick="addProject()">Add</button>
    </div>
    <div style="display:grid;gap:8px">
      ${s.projects.map(p=>`<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px">
        <div style="width:12px;height:12px;border-radius:50%;background:${p.color}"></div>
        <span style="flex:1;font-size:13px;color:var(--text)">${p.name}</span>
        <span style="font-size:12px;color:var(--sub)">${p.progress}%</span>
        <button onclick="deleteProject(${p.id})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:15px">🗑</button>
      </div>`).join('')}
    </div>
  </div>
  <div class="card" style="background:var(--card)">
    <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:12px">🎨 Appearance</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:var(--text);font-size:14px">Dark Mode</span>
      <div class="switch" style="background:${s.dark?'#6366f1':'var(--border)'}" onclick="toggleDark()">
        <div class="switch-thumb" style="left:${s.dark?'25px':'3px'}"></div>
      </div>
    </div>
  </div>`;
}

// ── Event handlers ─────────────────────────────────────
function toggleDark(){ state.dark=!state.dark; re(); }
function setTab(t){ state.tab=t; re(); }
function clearReminder(){ state.reminder=null; re(); }
function calPrev(){ const m=state.calMonth; state.calMonth=new Date(m.getFullYear(),m.getMonth()-1); re(); }
function calNext(){ const m=state.calMonth; state.calMonth=new Date(m.getFullYear(),m.getMonth()+1); re(); }

function toggleTaskForm(){ state.showTaskForm=!state.showTaskForm; re(); }
function updateTaskForm(k,v){ state.taskForm[k]=v; }
function addTask(){
  const tf=state.taskForm;
  if(!tf.title.trim()) return;
  state.tasks.push({...tf,id:Date.now(),done:false});
  state.taskForm={title:'',priority:'Medium',due:TODAY,assignee:state.team[0],reminder:false};
  state.showTaskForm=false;
  re();
}
function toggleTask(id){ state.tasks=state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t); re(); }
function deleteTask(id){ state.tasks=state.tasks.filter(t=>t.id!==id); re(); }

function toggleHabit(id){ state.habits=state.habits.map(h=>h.id===id?{...h,doneToday:!h.doneToday,streak:!h.doneToday?h.streak+1:Math.max(0,h.streak-1)}:h); re(); }
function adjustProgress(id,d){ state.projects=state.projects.map(p=>p.id===id?{...p,progress:clamp(p.progress+d,0,100)}:p); re(); }

function openNoteForm(id){
  if(id===null){ state.editNoteId=null; state.noteForm={title:'',body:'',color:'#fef9c3'}; }
  else{ const n=state.notes.find(n=>n.id===id); state.editNoteId=id; state.noteForm={title:n.title,body:n.body,color:n.color}; }
  state.showNoteForm=true; re();
}
function closeNoteForm(){ state.showNoteForm=false; state.editNoteId=null; re(); }
function updateNoteForm(k,v){ state.noteForm[k]=v; if(k!=='color') return; re(); }
function saveNote(){
  const nf=state.noteForm;
  if(!nf.title.trim()) return;
  if(state.editNoteId!==null){ state.notes=state.notes.map(n=>n.id===state.editNoteId?{...n,...nf}:n); state.editNoteId=null; }
  else{ state.notes.push({id:Date.now(),...nf,pinned:false}); }
  state.showNoteForm=false; re();
}
function deleteNote(id){ state.notes=state.notes.filter(n=>n.id!==id); re(); }
function pinNote(id){ state.notes=state.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n); re(); }

function addMember(){
  const v=($('inp-member')||{value:state.newMember}).value.trim()||state.newMember.trim();
  if(!v) return;
  state.team.push(v); state.newMember=''; re();
}
function deleteMember(name){ if(name==='Me') return; state.team=state.team.filter(m=>m!==name); re(); }
function addProject(){
  const v=($('inp-project')||{value:state.newProject}).value.trim()||state.newProject.trim();
  if(!v) return;
  state.projects.push({id:Date.now(),name:v,progress:0,color:PROJ_COLORS[state.projects.length%PROJ_COLORS.length]});
  state.newProject=''; re();
}
function deleteProject(id){ state.projects=state.projects.filter(p=>p.id!==id); re(); }

function bindEvents(){}

// ── Init ───────────────────────────────────────────────
applyTheme();
render();

// Reminder check
const dueToday = state.tasks.filter(t=>!t.done&&t.reminder&&t.due===TODAY);
if(dueToday.length){ state.reminder=`⏰ Reminder: "${dueToday[0].title}" is due today!`; render(); }
</script>
</body>
</html>
